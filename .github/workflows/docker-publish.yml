name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag adicional para a imagem (ex: hotfix-2026-04-25). Opcional.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  # Deriva owner/repo automaticamente do repositório (ex.: paroquia-sao-benedito/pascom).
  # O metadata-action faz lowercase do nome, então é seguro mesmo se o owner/repo
  # tiver maiúsculas. Renomeie o repositório no GitHub para mudar o nome da imagem.
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # GITHUB_TOKEN é auto-gerado por run, com escopo packages:write
        # (declarado em `permissions` acima). Não precisa configurar
        # secret na org — funciona out-of-the-box. Trocar pra um PAT
        # só se for publicar em uma org/repo DIFERENTE deste workflow.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write composer auth to file
        # `secrets:` inline do build-push-action mangle JSON multilinha.
        # Gravando num arquivo + secret-files preserva 100% do conteúdo.
        # O runner é descartável; o arquivo morre junto com a VM.
        run: |
          printf '%s' '${{ secrets.COMPOSER_AUTH }}' > /tmp/composer-auth.json
          # Sanity check (sem expor o conteúdo nos logs):
          test -s /tmp/composer-auth.json || { echo "COMPOSER_AUTH secret vazio"; exit 1; }
          jq empty /tmp/composer-auth.json || { echo "COMPOSER_AUTH não é JSON válido"; exit 1; }

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            DB_DRIVERS=pgsql
            EXTRA_PECL=redis
            EXTRA_EXT=
          # auth.json com credenciais de algum registry Composer privado, se o
          # composer.json ainda referenciar pacote privado. O mount no Dockerfile
          # é `required=false`, então o build funciona mesmo sem o secret — se
          # não houver mais pacote privado (o tema Filament foi removido), dá pra
          # apagar este bloco + a step "Write composer auth" + o secret no GitHub.
          # O Dockerfile consome via `--mount=type=secret,id=composer_auth` — não
          # vaza pra nenhuma layer da imagem final. Usamos `secret-files`
          # (arquivo) em vez de `secrets:` (inline) porque JSON com
          # múltiplos pares quebra o parser quando passado inline.
          secret-files: |
            composer_auth=/tmp/composer-auth.json
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Imagem publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
