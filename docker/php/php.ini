memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300
max_input_vars = 10000

display_errors = On
display_startup_errors = On
log_errors = On
; E_ALL menos deprecations — evita 500 em dev quando libs/configs ainda usam
; símbolos marcados @deprecated (ex.: PDO::MYSQL_ATTR_* removidos em favor de
; Pdo\Mysql::ATTR_* no PHP 8.5). Deprecations continuam indo pro log.
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED

date.timezone = America/Sao_Paulo

session.gc_maxlifetime = 1440
session.cookie_httponly = On
session.use_strict_mode = On
session.use_only_cookies = 1

realpath_cache_size = 4096k
realpath_cache_ttl = 600

; Opcache — dev-tuned. validate_timestamps=1 + revalidate_freq=0 checks file
; mtimes on every request so edits are picked up instantly. For production,
; flip revalidate_freq to 60+ (or validate_timestamps=0 with a reload on
; deploy) to remove the stat() cost per request.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.fast_shutdown=1
