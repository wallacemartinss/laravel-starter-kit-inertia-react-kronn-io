; =============================================================================
; PHP Production Configuration - High Performance
; =============================================================================

[PHP]
; --------------------------------------------------------------------------
; Engine
; --------------------------------------------------------------------------
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = On
zlib.output_compression_level = 4
implicit_flush = Off
serialize_precision = -1

; --------------------------------------------------------------------------
; Security
; --------------------------------------------------------------------------
expose_php = Off
; proc_open is intentionally NOT disabled: Laravel's scheduler (schedule:work)
; and Horizon spawn their worker processes through it. The shell-exec family
; (exec/passthru/shell_exec/system/popen) stays disabled.
; curl_exec/curl_multi_exec stay ENABLED: Guzzle (Laravel HTTP client, AWS S3
; SDK, Pusher/Soketi) auto-selects its cURL handler only when these functions
; exist. Disabling them forced a silent fallback to the slower stream wrapper
; and broke cURL-only features (multi handle, streaming uploads).
disable_functions = exec,passthru,shell_exec,system,popen,parse_ini_file,show_source,dl
allow_url_fopen = On
allow_url_include = Off
open_basedir = /var/www/html:/tmp:/var/log

; --------------------------------------------------------------------------
; Performance: Memory & Execution
; --------------------------------------------------------------------------
max_execution_time = 120
max_input_time = 60
max_input_nesting_level = 256
max_input_vars = 5000
memory_limit = 512M

; --------------------------------------------------------------------------
; Error Handling (production: log only, never display)
; --------------------------------------------------------------------------
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 4096
error_log = /var/log/php-error.log
ignore_repeated_errors = On
ignore_repeated_source = Off

; --------------------------------------------------------------------------
; File Uploads
; --------------------------------------------------------------------------
file_uploads = On
upload_max_filesize = 50M
max_file_uploads = 20
post_max_size = 55M

; --------------------------------------------------------------------------
; Data Handling
; --------------------------------------------------------------------------
default_charset = "UTF-8"
default_mimetype = "text/html"
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On

; --------------------------------------------------------------------------
; Paths & Extensions
; --------------------------------------------------------------------------
enable_dl = Off
cgi.fix_pathinfo = 0

; --------------------------------------------------------------------------
; Session (override driver via Laravel .env)
; --------------------------------------------------------------------------
session.save_handler = files
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.gc_maxlifetime = 1440
session.gc_probability = 1
session.gc_divisor = 1000
session.sid_length = 48
session.sid_bits_per_character = 6

; --------------------------------------------------------------------------
; Date — Brasil. Sem isso, now(), Carbon::today() e cron rodam em UTC
; (3h atrasados); paroquianos veem "ontem" em vez de "hoje" depois das 21h.
; --------------------------------------------------------------------------
date.timezone = America/Sao_Paulo

; =============================================================================
; OPcache - Critical for Production Performance
; =============================================================================
[opcache]
opcache.enable = 1
opcache.enable_cli = 1
; Spatie MediaLibrary + Horizon + Pusher + vendor Laravel = código grande.
; 256MB enche e força recompilação contínua — subir pra 512MB elimina
; opcache churn em prod. (512MB fica folgado sem Filament/Livewire — pode
; baixar pra 384MB depois de medir opcache_get_status()['memory_usage'].)
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 30000
opcache.max_wasted_percentage = 10
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 128M
; Preload framework hot-path classes into shared memory at FPM start
; (preload-prod.php is COPYd into the image at this path). preload_user is
; mandatory because the FPM master boots as root; www-data owns the runtime.
; Changing preloaded files needs an FPM restart — fine in prod, since
; validate_timestamps=0 already requires a reload on every deploy.
opcache.preload=/var/www/html/docker/php/preload-prod.php
opcache.preload_user=www-data

; =============================================================================
; Realpath Cache - Reduces filesystem stat() calls
; =============================================================================
[realpath_cache]
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; =============================================================================
; cURL
; =============================================================================
[curl]
curl.cainfo = /etc/ssl/certs/ca-certificates.crt

; =============================================================================
; Intl
; =============================================================================
[intl]
intl.default_locale = en
intl.error_level = 0

; =============================================================================
; GD
; =============================================================================
[gd]
gd.jpeg_ignore_warning = 1
