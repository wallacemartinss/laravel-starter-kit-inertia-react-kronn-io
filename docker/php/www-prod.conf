; =============================================================================
; PHP-FPM Pool Configuration - High Performance Production
; =============================================================================

[www]
; --------------------------------------------------------------------------
; User/Group
; --------------------------------------------------------------------------
user = www-data
group = www-data

; --------------------------------------------------------------------------
; Listen
; --------------------------------------------------------------------------
listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

; --------------------------------------------------------------------------
; Process Manager: static for predictable high-performance
; --------------------------------------------------------------------------
pm = static
pm.max_children = 20
pm.max_requests = 1000

; --------------------------------------------------------------------------
; Timeouts
; --------------------------------------------------------------------------
request_terminate_timeout = 120
request_slowlog_timeout = 5s

; --------------------------------------------------------------------------
; Logging
; --------------------------------------------------------------------------
slowlog = /var/log/php-fpm-slow.log
catch_workers_output = yes
decorate_workers_output = no

; --------------------------------------------------------------------------
; Security
; --------------------------------------------------------------------------
security.limit_extensions = .php

; --------------------------------------------------------------------------
; Environment (clean, pass only essentials)
; --------------------------------------------------------------------------
clear_env = no
