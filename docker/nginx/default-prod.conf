# =============================================================================
# Rate Limiting Zones
# =============================================================================
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# =============================================================================
# Bad Bots Detection (User-Agent based)
# =============================================================================
map $http_user_agent $bad_bot {
    default 0;

    # SEO Crawlers (aggressive/unwanted)
    ~*(?i)(ahrefsbot|semrushbot|dotbot|mj12bot|blexbot|linkdexbot|gigabot) 1;
    ~*(?i)(megaindex|seokicks|siteexplorer|bomberbot|baiduspider) 1;
    ~*(?i)(yandexbot|sogou|exabot|majestic|serpstatbot|dataforseo) 1;

    # Security Scanners & Penetration Tools
    ~*(?i)(sqlmap|nikto|nmap|masscan|zgrab|nuclei|httpx) 1;
    ~*(?i)(wpscan|joomscan|droopescan|cmsmap|wapiti) 1;
    ~*(?i)(acunetix|nessus|openvas|qualys|burpsuite) 1;
    ~*(?i)(dirbuster|gobuster|dirb|ffuf|feroxbuster) 1;

    # Generic HTTP Libraries (often used by bots/scrapers)
    ~*(?i)(python-requests|python-urllib|python-httpx|aiohttp) 1;
    ~*(?i)(go-http-client|java\/|okhttp) 1;
    ~*(?i)(scrapy|httpclient|libwww|lwp-|mechanize) 1;
    ~*(?i)(petalbot|bytespider|amazonbot|gptbot|claudebot) 1;
    ~*(?i)(ccbot|commoncrawl|ia_archiver|archive\.org) 1;

    # Reconnaissance Tools
    ~*(?i)(censys|shodan|internetmeasurement|onyphe|binaryedge) 1;

    # Empty User-Agent
    "" 1;
}

# =============================================================================
# Block suspicious HTTP methods
# =============================================================================
map $request_method $bad_method {
    default 0;
    ~*(?i)(TRACE|TRACK|DEBUG|CONNECT) 1;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # =========================================================================
    # Real IP (behind Traefik / Docker network)
    # =========================================================================
    real_ip_header X-Forwarded-For;
    # Hops internos confiáveis (overlay do Swarm / Traefik).
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    # Edge da Cloudflare. SEM confiar nestas faixas, o nginx para no IP do
    # edge da CF (ex.: 172.68.x / 104.x) ao subir o XFF — e é ESSE que vira
    # $remote_addr (errado no access.log E no rate limit, que fica chaveado
    # no edge em vez do visitante). Mantenha em sincronia com
    # config/cloudflare-ips.php.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    # Anda o XFF da direita p/ esquerda pulando todos os trusted acima
    # (overlay + CF) até o 1º IP não-confiável = o visitante real.
    real_ip_recursive on;

    # =========================================================================
    # Security Headers
    # =========================================================================
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy controla quais APIs sensíveis cada origem pode usar.
    #   ()      = ninguém (nem o próprio site) — bloqueia até o user dar permissão
    #   (self)  = só o próprio site pode pedir permissão (o user decide depois)
    #   (*)     = qualquer site/iframe (NÃO usar)
    #
    # camera=(self): necessária pra selfie do reconhecimento facial
    # em /portal/identificacao. Sem isso, o navegador NEM PEDE permissão
    # ao usuário — bloqueia direto, independente da config do app
    # (Android/iOS) ter liberado a câmera pro Chrome.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;

    # =========================================================================
    # Bot & Security Blocks
    # =========================================================================
    if ($bad_bot) {
        return 403;
    }

    if ($bad_method) {
        return 405;
    }

    # Block .env, .git, .docker and other sensitive paths
    location ~* ^/(\.env|\.git|\.svn|\.htaccess|\.htpasswd|\.aws|\.docker|\.kube) {
        return 403;
    }

    # Block CMS scanner paths
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-login|wordpress|phpmyadmin|adminer|phpinfo|pma|mysql|myadmin) {
        return 403;
    }

    # Block common config files
    location ~* (config\.php|settings\.php|local\.xml|parameters\.yml|database\.yml|\.ini$|\.log$|\.conf$) {
        return 403;
    }

    # Block vulnerability scan patterns
    location ~* (eval\(|base64_|union.*select|concat\(|\/etc\/passwd|\.\.\/|<script|%3Cscript) {
        return 403;
    }

    # Block backup/temp file extensions
    location ~* \.(bak|old|orig|save|swp|sql|tar|gz|zip|rar|7z|dump|db|sqlite)$ {
        return 403;
    }

    # Block shell/backdoor extensions
    location ~* \.(phtml|pht|php3|php4|php5|phps|cgi|pl|py|sh|bash|asp|aspx|jsp)$ {
        return 403;
    }

    # =========================================================================
    # Rate Limited Routes
    # =========================================================================

    # Strict rate limit for auth routes
    location ~* ^/(login|register|password|forgot-password|reset-password|verify-email|two-factor) {
        limit_req zone=login burst=3 nodelay;
        limit_conn conn_limit 5;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API rate limiting
    location ^~ /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_conn conn_limit 30;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Upload direto pra S3 (sign/confirm/resume): cliente faz N PUTs em
    # paralelo + confirms — fácil estourar o burst do general. Mantém
    # próximo do `api` mas com burst maior pro caso de álbum grande.
    location ~ ^/pastorais/[^/]+/photos/upload/ {
        limit_req zone=api burst=200 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Soketi/Echo auth — chamado uma vez por subscribe de canal privado.
    # 50 paroquianos abrindo o mural ao mesmo tempo = 50 hits aqui.
    location = /broadcasting/auth {
        limit_req zone=api burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # Main Location
    # =========================================================================
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn conn_limit 20;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # PWA Routes (Service Worker + Manifest)
    # =========================================================================
    # `/sw.js` e `/manifest.webmanifest` são SERVIDOS PELO LARAVEL (controllers
    # dinâmicos em App\Http\Controllers\Pwa\ManifestController). Precisam de
    # exact-match aqui pra ganhar prioridade sobre o regex genérico de
    # `.(css|js)$` lá embaixo — senão Nginx tenta servir como arquivo estático
    # em public/, não acha, retorna 404 silencioso.
    #
    # No-cache rígido pra que mudanças no SW propaguem instantâneo (Cloudflare
    # respeita Cache-Control: no-store que o controller envia).
    location = /sw.js {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    location = /manifest.webmanifest {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # =========================================================================
    # Static Assets
    # =========================================================================

    # Vite build assets (immutable, versioned) — inclui ESM (.mjs) e imagens/
    # ícones com hash que o React importa no JSX (svg/png/jpg/gif/webp/avif).
    location ~* ^/build/assets/.*\.(js|mjs|css|woff|woff2|ttf|eot|svg|png|jpe?g|gif|webp|avif)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images
    location ~* \.(jpg|jpeg|png|gif|bmp|svg|webp|avif|ico)$ {
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        limit_req zone=general burst=50 nodelay;
    }

    # Fonts
    location ~* \.(eot|ttf|woff|woff2|otf)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS (non-versioned)
    location ~* \.(css|js)$ {
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # =========================================================================
    # PHP Processing
    # =========================================================================
    location ~ \.php$ {
        # Block PHP execution in uploads/storage
        location ~* /(uploads|storage)/.*\.php$ {
            return 403;
        }

        try_files $uri =404;

        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param REMOTE_ADDR $remote_addr;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 60;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # =========================================================================
    # Block Hidden Files (except .well-known)
    # =========================================================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # =========================================================================
    # Favicon & robots.txt
    # =========================================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        expires 1d;
    }

    # =========================================================================
    # Health Check (for Traefik / load balancers)
    # =========================================================================
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
